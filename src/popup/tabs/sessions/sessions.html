<div class="padding-20">
    <div class="grid-3col">
        <div class="card card-min-height">
            <h3 class="section-title">OAuth</h3>
            <div class="form-section">
                <div class="form-field">
                    <label class="label-block"> Preset Apps </label>
                    <select id="presetSelector" class="select-full"></select>
                </div>

                <div style="margin-top: 12px">
                    <div class="form-field-small">
                        <label class="label-small"> Client ID: </label>
                        <input
                            type="text"
                            id="clientIdInput"
                            value="1b730954-1685-4b74-9bfd-dac224a7b894"
                            placeholder="Azure App Client ID"
                            class="input-full text-mono text-sm"
                        />
                    </div>

                    <div class="form-field-small">
                        <label class="label-small"> Redirect URI: </label>
                        <input
                            type="text"
                            id="redirectUriInput"
                            value="https://login.microsoftonline.com/common/oauth2/nativeclient"
                            placeholder="Redirect URI"
                            class="input-full text-mono text-sm"
                        />
                    </div>

                    <div class="form-field-small">
                        <label class="label-small"> Scope: </label>
                        <input
                            type="text"
                            id="scopeInput"
                            value="https://graph.microsoft.com/.default offline_access"
                            placeholder="Space-separated scopes"
                            class="input-full text-mono text-sm"
                        />
                    </div>

                    <div class="form-field-small">
                        <label class="label-small"> Auth URL: </label>
                        <input
                            type="text"
                            id="authUrlInput"
                            value="https://login.microsoftonline.com/common/oauth2/v2.0/authorize"
                            placeholder="Authorization endpoint"
                            class="input-full text-mono text-sm"
                        />
                    </div>

                    <div class="form-field-last">
                        <label class="label-small"> Token URL: </label>
                        <input
                            type="text"
                            id="tokenUrlInput"
                            value="https://login.microsoftonline.com/common/oauth2/v2.0/token"
                            placeholder="Token endpoint"
                            class="input-full text-mono text-sm"
                        />
                    </div>
                </div>
            </div>

            <div class="flex-gap">
                <button class="btn btn-primary" id="getGraphToken">
                    🔑 Get New Token
                </button>
            </div>
        </div>

        <div class="card">
            <h3 class="section-title">Saved Sessions</h3>

            <div
                style="
                    margin-bottom: 12px;
                    padding: 8px;
                    background: var(--card-bg);
                    border: 1px solid var(--border-color);
                    border-radius: 4px;
                "
            >
                <label
                    style="
                        display: flex;
                        align-items: center;
                        gap: 8px;
                        cursor: pointer;
                    "
                >
                    <input
                        type="checkbox"
                        id="autoRefreshCheckbox"
                        style="cursor: pointer"
                    />
                    <span style="font-size: 13px"
                        >Auto-refresh sessions when &lt; 5 min to
                        expiration</span
                    >
                </label>
            </div>

            <div id="m365SessionsContainer" class="scrollable-container"></div>
        </div>

        <div class="card">
            <h3 class="section-title">Active Session</h3>

            <div id="activeSessionDisplay" class="active-session-box">
                <div class="session-info-field">
                    <strong class="session-info-label">Session</strong>
                    <div
                        id="activeSessionName"
                        class="session-info-value"
                    ></div>
                </div>
                <div class="session-info-field">
                    <strong class="session-info-label">User</strong>
                    <div
                        id="activeSessionUser"
                        class="session-info-value"
                    ></div>
                </div>
                <div class="session-info-field">
                    <strong class="session-info-label">Expires</strong>
                    <div
                        id="activeSessionExpiry"
                        class="session-info-value"
                    ></div>
                </div>
                <div class="session-info-field">
                    <strong class="session-info-label">Created At</strong>
                    <div
                        id="activeSessionCreatedAt"
                        class="session-info-value"
                    ></div>
                </div>
                <div class="session-info-field">
                    <strong class="session-info-label">Client ID</strong>
                    <div
                        id="activeSessionClientId"
                        class="session-info-value"
                    ></div>
                </div>
                <div class="session-info-field">
                    <strong class="session-info-label"
                        >Scopes (Requested)</strong
                    >
                    <div
                        id="activeSessionRequestedScopes"
                        class="session-info-value"
                    ></div>
                </div>
                <div class="session-info-field">
                    <strong class="session-info-label">Auth URL</strong>
                    <div
                        id="activeSessionAuthUrl"
                        class="session-info-value"
                    ></div>
                </div>
                <div class="session-info-field">
                    <strong class="session-info-label">Token URL</strong>
                    <div
                        id="activeSessionTokenUrl"
                        class="session-info-value"
                    ></div>
                </div>
                <div class="session-info-field">
                    <button id="toggleActiveScopes" class="toggle-btn">
                        View Scopes
                    </button>
                    <div id="activeScopesDisplay" class="scopes-display"></div>
                </div>

                <div class="action-row">
                    <button
                        class="btn btn-primary btn-small"
                        id="refreshActiveSession"
                    >
                        🔄 Refresh
                    </button>
                    <button
                        class="btn btn-primary btn-small"
                        id="editActiveSession"
                    >
                        ✏️ Edit
                    </button>
                    <button
                        class="btn btn-danger-outline btn-small"
                        id="clearActiveSession"
                    >
                        🗑️ Clear
                    </button>
                </div>
            </div>

            <div id="noActiveSessionMessage" class="no-session-message">
                No active session
            </div>
        </div>
    </div>
</div>
